# POS System Configuration
# Lines starting with # are comments.
# Format: key = value  (no quotes needed)

[store]
name    = My Store
address = 123 Main Street
currency = Rs

[printer]
# Path to ESC-POS thermal printer device.
# Common: /dev/usb/lp0  (USB)  or  /dev/ttyUSB0  (serial)
device  = /dev/usb/lp0

[display]
# Window resolution (used in windowed mode).
# On a touch-screen kiosk set this to your panel resolution.
width   = 1280
height  = 720
# Set fullscreen = 1 to start in fullscreen desktop mode
fullscreen = 0

[sync]
# Set enabled = 0 to run fully offline
enabled  = 1
host     = localhost
port     = 8080
path     = /pos/transactions
# API key sent as "Authorization: Bearer <api_key>"
api_key  = CHANGE_ME
# How often to attempt sync (seconds)
interval = 30

[db]
# Path to the SQLite3 database file
path = pos.db

[input]
# touchscreen = 1  → on-screen keyboard pops up when you tap a text field
# touchscreen = 0  → hardware keyboard (physical keys type directly into fields)
touchscreen = 1
